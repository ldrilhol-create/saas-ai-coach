<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
.logo-text { fill: #1f2937; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.logo-accent { fill: none; stroke: #3b82f6; stroke-width: 2.5; }
.logo-arrow { fill: none; stroke: #10b981; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

@media (prefers-color-scheme: dark) {
  .logo-text { fill: #ffffff; }
}
</style>
</defs>

<!-- Brain logo -->
<g transform="translate(30, 50)">
  <circle cx="40" cy="30" r="28" class="logo-accent"/>
  <path d="M 40 5 Q 35 15 35 30 Q 35 45 40 55" class="logo-accent"/>
  <path d="M 40 5 Q 45 15 45 30 Q 45 45 40 55" class="logo-accent"/>
  <path d="M 40 50 L 40 70 M 40 70 L 35 65 M 40 70 L 45 65" class="logo-arrow"/>
</g>

<!-- Text -->
<text x="140" y="80" font-size="48" font-weight="600" class="logo-text">Business Coach IA</text>
<text x="140" y="105" font-size="16" class="logo-text" opacity="0.7">Coaching personnalisé pour entrepreneurs</text>
</svg>