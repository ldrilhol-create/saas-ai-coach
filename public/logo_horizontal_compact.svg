<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
.logo-text { fill: #1f2937; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.logo-accent { fill: none; stroke: #3b82f6; stroke-width: 1.8; }
.logo-arrow { fill: none; stroke: #10b981; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

@media (prefers-color-scheme: dark) {
  .logo-text { fill: #ffffff; }
}
</style>
</defs>

<!-- Brain logo compact -->
<g transform="translate(15, 15)">
  <circle cx="30" cy="25" r="20" class="logo-accent"/>
  <path d="M 30 8 Q 26 14 26 25 Q 26 36 30 43" class="logo-accent"/>
  <path d="M 30 8 Q 34 14 34 25 Q 34 36 30 43" class="logo-accent"/>
  <path d="M 30 43 L 30 55 M 30 55 L 27 50 M 30 55 L 33 50" class="logo-arrow"/>
</g>

<!-- Text BCA -->
<text x="75" y="55" font-size="32" font-weight="600" class="logo-text">BCA</text>
</svg>