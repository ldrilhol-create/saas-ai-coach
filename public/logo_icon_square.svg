<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
.bg-light { fill: #f3f4f6; }
.accent { fill: none; stroke: #3b82f6; stroke-width: 20; }
.arrow { fill: none; stroke: #10b981; stroke-width: 20; stroke-linecap: round; stroke-linejoin: round; }

@media (prefers-color-scheme: dark) {
  .bg-light { fill: #1f2937; }
}
</style>
</defs>

<!-- Background -->
<rect x="0" y="0" width="512" height="512" rx="80" class="bg-light"/>

<!-- Brain icon centered -->
<g transform="translate(256, 256)">
  <circle cx="0" cy="-30" r="120" class="accent"/>
  <path d="M 0 -140 Q -40 -80 -40 -30 Q -40 80 0 160" class="accent"/>
  <path d="M 0 -140 Q 40 -80 40 -30 Q 40 80 0 160" class="accent"/>
  <path d="M 0 160 L 0 240 M 0 240 L -35 185 M 0 240 L 35 185" class="arrow"/>
</g>
</svg>